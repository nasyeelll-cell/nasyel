<script>
let i = 0;
let playing = false;

const data = [
  ["hey, Rian? or Brian?", "Semangat kuliahnya ya."],
  ["just a stranger", "Gue cuma stranger yang doain lo sukses dan lulus tepat waktu."],
  ["aamiin", "Semoga semua yang lo kejar tercapai 🤍"],
  ["maybe someday", "I hope someday we can meet at the right time."],
  ["for now", "Untuk sekarang, kita senggol-senggolan api dulu 🔥"],
  ["another time", "Nanti kita ngobrol lagi ya..."],
  ["last", "Salam dari putri Ciledug 👑"]
];

// typing effect
function typeText(element, text, speed = 40) {
  element.innerText = "";
  let i = 0;

  function typing() {
    if (i < text.length) {
      element.innerText += text.charAt(i);
      i++;
      setTimeout(typing, speed);
    }
  }

  typing();
}

// next button
function next() {
  i++;
  if (i >= data.length) {
    alert("Take care ya 🤍");
    i = 0;
  }

  typeText(document.getElementById("title"), data[i][0]);
  typeText(document.getElementById("text"), data[i][1]);
}

// fade music
function fadeInAudio(audio) {
  audio.volume = 0;
  let vol = 0;

  const fade = setInterval(() => {
    if (vol < 1) {
      vol += 0.05;
      audio.volume = vol;
    } else {
      clearInterval(fade);
    }
  }, 200);
}

// toggle music
function toggleMusic() {
  const music = document.getElementById("bgm");
  const btn = document.querySelector(".music-btn");

  if (!playing) {
    music.play();
    fadeInAudio(music);
    btn.innerText = "⏸ pause";
    playing = true;
  } else {
    music.pause();
    btn.innerText = "🎧 play";
    playing = false;
  }
}
</script>    playing = false;

}
</script>
