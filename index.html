<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Brian</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  overflow: hidden;
}

/* glow background */
body::before {
  content: "";
  position: absolute;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(255,105,180,0.25), transparent 70%);
  animation: float 7s ease-in-out infinite;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-40px); }
}

.card {
  background: rgba(255,255,255,0.06);
  padding: 45px;
  border-radius: 25px;
  backdrop-filter: blur(18px);
  max-width: 520px;
  text-align: center;
  box-shadow: 0 0 40px rgba(255,105,180,0.2);
  animation: fadeIn 1s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(25px); }
  to { opacity: 1; transform: translateY(0); }
}

h1 {
  font-size: 28px;
  margin-bottom: 15px;
  background: linear-gradient(45deg, #ff7aa2, #ffb6c1);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

p {
  font-size: 15px;
  line-height: 1.7;
  opacity: 0.9;
}

.highlight {
  color: #ff7aa2;
  font-weight: 600;
}

button {
  margin-top: 25px;
  padding: 12px 25px;
  border: none;
  border-radius: 30px;
  background: linear-gradient(45deg, #ff7aa2, #ff4f81);
  color: white;
  cursor: pointer;
  box-shadow: 0 0 15px rgba(255,105,180,0.6);
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px rgba(255,105,180,0.9);
}

.fade {
  animation: fadeText 0.6s ease;
}

@keyframes fadeText {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="card">
  <h1 id="title">hey, Rian? or Brian? 😆</h1>
  <p id="text" class="fade">
    klik dulu deh pelan-pelan...
  </p>

  <button onclick="nextPage()">Next</button>
</div>

<script>
let page = 0;

const pages = [
  {
    title: "hey, Rian? or Brian? 😆",
    text: "Semangat kuliahnya ya..."
  },
  {
    title: "just a stranger 🤍",
    text: "Gue cuma stranger yang bakal doain lo biar sukses ke depannya dan lulus tepat waktu."
  },
  {
    title: "aamiin ✨",
    text: "Semoga semua yang lo kejar tercapai. <span class='highlight'>Aamiin 🤍</span>"
  },
  {
    title: "maybe someday...",
    text: "I hope someday we can meet at the right time."
  },
  {
    title: "for now 🔥",
    text: "Untuk sekarang, kita <span class='highlight'>senggol-senggolan api dulu 🔥</span>"
  },
  {
    title: "another time",
    text: "Kalau lagi ada waktu luang, kita ngobrol lagi kayak awal gue kenal lo."
  },
  {
    title: "last one 👑",
    text: "Salam dari putri Ciledug 👑"
  }
];

function nextPage() {
  page++;
  
  if (page >= pages.length) {
    alert("Take care yaa 🤍");
    page = 0;
  }

  document.getElementById("title").innerHTML = pages[page].title;
  document.getElementById("text").innerHTML = pages[page].text;

  document.getElementById("text").classList.remove("fade");
  void document.getElementById("text").offsetWidth;
  document.getElementById("text").classList.add("fade");
}
</script>

</body>
</html>
