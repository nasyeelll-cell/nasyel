<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Brian</title>

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #0d0d14;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: #f5f5f5;
}

/* card */
.card {
  width: 420px;
  padding: 50px 40px;
  border-radius: 20px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  text-align: center;
}

/* text */
h1 {
  font-size: 22px;
  color: #ff8fb1;
}

p {
  font-size: 15px;
  line-height: 1.8;
  color: rgba(255,255,255,0.75);
  min-height: 70px;
}

/* buttons */
button {
  margin-top: 20px;
  padding: 10px 22px;
  border-radius: 20px;
  border: none;
  background: rgba(255,143,177,0.15);
  color: #ff8fb1;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #ff8fb1;
  color: #0d0d14;
}

/* music button */
.music-btn {
  position: absolute;
  top: 20px;
  right: 20px;
  font-size: 13px;
  opacity: 0.7;
}
</style>
</head>

<body>

<button class="music-btn" onclick="toggleMusic()">🎧 play</button>

<div class="card">
  <h1 id="title">hey, Rian? or Brian?</h1>
  <p id="text">klik pelan ya...</p>
  <button onclick="next()">next</button>
</div>

<!-- AUDIO (SUDAH DIGANTI) -->
<audio id="bgm" loop>
  <source src="https://drive.google.com/uc?export=download&id=1wejHaWW5jRo5ZOOMqdRLzu2_CEBfAnD1" type="audio/mpeg">
</audio>

<script>
let i = 0;
let playing = false;

const data = [
  ["hey, Rian? or Brian?", "Semangat kuliahnya ya."],
  ["just a stranger", "Gue cuma stranger yang doain lo sukses dan lulus tepat waktu."],
  ["aamiin", "Semoga semua yang lo kejar tercapai 🤍"],
  ["maybe someday", "I hope someday we can meet at the right time."],
  ["for now", "Untuk sekarang, kita senggol-senggolan api dulu 🔥"],
  ["another time", "Nanti kita ngobrol lagi ya..."],
  ["last", "Salam dari putri Ciledug 👑"]
];

function next() {
  i++;
  if (i >= data.length) {
    alert("Take care ya 🤍");
    i = 0;
  }

  document.getElementById("title").innerText = data[i][0];
  document.getElementById("text").innerText = data[i][1];
}

function toggleMusic() {
  const music = document.getElementById("bgm");
  const btn = document.querySelector(".music-btn");

  if (!playing) {
    music.play();
    btn.innerText = "⏸ pause";
    playing = true;
  } else {
    music.pause();
    btn.innerText = "🎧 play";
    playing = false;
  }
}
</script>

</body>
</html>
