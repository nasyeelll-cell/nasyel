<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Brian</title>

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #0d0d14;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: #f5f5f5;
}

/* container */
.card {
  width: 420px;
  padding: 50px 40px;
  border-radius: 20px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  text-align: center;
  transition: 0.5s;
}

/* title */
h1 {
  font-size: 22px;
  font-weight: 500;
  margin-bottom: 20px;
  color: #ff8fb1;
}

/* text */
p {
  font-size: 15px;
  line-height: 1.8;
  color: rgba(255,255,255,0.75);
  min-height: 70px;
}

/* button */
button {
  margin-top: 30px;
  padding: 10px 22px;
  border-radius: 20px;
  border: none;
  background: rgba(255,143,177,0.15);
  color: #ff8fb1;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #ff8fb1;
  color: #0d0d14;
}

/* smooth fade */
.fade-out {
  opacity: 0;
  transform: translateY(10px);
}

.fade-in {
  opacity: 1;
  transform: translateY(0);
  transition: 0.6s;
}
</style>
</head>

<body>

<div class="card">
  <h1 id="title">hey, Rian? or Brian?</h1>
  <p id="text">klik pelan ya...</p>
  <button onclick="next()">next</button>
</div>

<script>
let i = 0;

const data = [
  ["hey, Rian? or Brian?", "Semangat kuliahnya ya."],
  ["just a stranger", "Gue cuma stranger yang doain lo sukses dan lulus tepat waktu."],
  ["aamiin", "Semoga semua yang lo kejar tercapai. 🤍"],
  ["maybe someday", "I hope someday we can meet at the right time."],
  ["for now", "Untuk sekarang, kita senggol-senggolan api dulu 🔥"],
  ["another time", "Nanti kita ngobrol lagi ya, kayak awal kenal."],
  ["last", "Salam dari putri Ciledug 👑"]
];

function next() {
  const title = document.getElementById("title");
  const text = document.getElementById("text");

  title.classList.add("fade-out");
  text.classList.add("fade-out");

  setTimeout(() => {
    i++;
    if (i >= data.length) {
      alert("Take care ya 🤍");
      i = 0;
    }

    title.innerText = data[i][0];
    text.innerText = data[i][1];

    title.classList.remove("fade-out");
    text.classList.remove("fade-out");

    title.classList.add("fade-in");
    text.classList.add("fade-in");
  }, 300);
}
</script>

</body>
</html>
